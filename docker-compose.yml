services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - var_data:/app/var
      - images_data:/app/public/images
    environment:
      SERVER_NAME: "${SERVER_NAME:-localhost}"
      APP_ENV: prod
      APP_SECRET: "${APP_SECRET:-change_me_in_production}"
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data.db"
      MAILER_FROM: "${MAILER_FROM:-contact@nicolas-rodriguez.fr}"
      MAILER_BREVO_LOGIN: "${MAILER_BREVO_LOGIN:-}"
      MAILER_BREVO_KEY: "${MAILER_BREVO_KEY:-}"
      MAILER_DSN: "smtp://${MAILER_BREVO_LOGIN:-}:${MAILER_BREVO_KEY:-}@smtp-relay.brevo.com:587"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"

volumes:
  var_data:
  images_data:
